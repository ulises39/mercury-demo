rest:
  #
  # Default Mercury actuator endpoints
  #
  - service: "event.api.service"
    methods: ['POST']
    url: "/api/event"
    timeout: 60s
    tracing: true

  - service: "info.actuator.service"
    methods: ['GET']
    url: "/info"
    timeout: 10s

  - service: "routes.actuator.service"
    methods: ['GET']
    url: "/info/routes"
    timeout: 10s

  - service: "health.actuator.service"
    methods: ['GET']
    url: "/health"
    timeout: 10s

  - service: "liveness.actuator.service"
    methods: ['GET']
    url: "/livenessprobe"
    timeout: 10s

  - service: "env.actuator.service"
    methods: ['GET']
    url: "/env"
    timeout: 10s

  #
  # Person service
  #
  - service: "person.list.visitors"
    methods: ['GET']
    url: "/api/visitors"
    timeout: 10s

  - service: "person.get.visitor"
    methods: ['GET']
    url: "/api/visitors/{id}"
    timeout: 10s

  #
  # Welcome service
  #
  - service: "welcome.register.visitor"
    methods: ['POST']
    url: "/api/visitors"
    timeout: 10s
