rest:
  #
  # Default Mercury actuator endpoints
  #
  - service: "event.api.service"
    methods: ['POST']
    url: "/api/event"
    timeout: 60s
    tracing: true

  - service: "info.actuator.service"
    methods: ['GET']
    url: "/info"
    timeout: 10s

  - service: "routes.actuator.service"
    methods: ['GET']
    url: "/info/routes"
    timeout: 10s

  - service: "health.actuator.service"
    methods: ['GET']
    url: "/health"
    timeout: 10s

  - service: "liveness.actuator.service"
    methods: ['GET']
    url: "/livenessprobe"
    timeout: 10s

  - service: "env.actuator.service"
    methods: ['GET']
    url: "/env"
    timeout: 10s

  #
  # Person service
  #
  - service: "person.list.visitors"
    methods: ['GET']
    url: "/api/visitors"
    timeout: 10s

  - service: "person.get.visitor"
    methods: ['GET']
    url: "/api/visitors/{id}"
    timeout: 10s

  #
  # Welcome service
  #
  - service: "welcome.register.visitor"
    methods: ['POST']
    url: "/api/visitors"
    timeout: 10s

  #
  # Consolidation service
  #
  - service: "consolidation.accept"
    methods: ['POST']
    url: "/api/visitors/{id}/consolidation/accept"
    timeout: 10s

  - service: "consolidation.decline"
    methods: ['POST']
    url: "/api/visitors/{id}/consolidation/decline"
    timeout: 10s

  - service: "consolidation.record.attendance"
    methods: ['POST']
    url: "/api/visitors/{id}/classes/attendance"
    timeout: 10s

  #
  # BSG service
  #
  - service: "bsg.list.groups"
    methods: ['GET']
    url: "/api/bsg/groups"
    timeout: 10s

  - service: "bsg.create.group"
    methods: ['POST']
    url: "/api/bsg/groups"
    timeout: 10s

  - service: "bsg.accept"
    methods: ['POST']
    url: "/api/visitors/{id}/bsg/accept"
    timeout: 10s

  - service: "bsg.decline"
    methods: ['POST']
    url: "/api/visitors/{id}/bsg/decline"
    timeout: 10s

  #
  # Task service
  #
  - service: "task.list"
    methods: ['GET']
    url: "/api/tasks"
    timeout: 10s
